<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- App Title -->
    <title>PresentIQ — Attendance Management System</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Comprehensive, role-based attendance management system for educational institutions, teachers, and students."
    />
    <meta name="author" content="Gaurav Deori" />
    <meta name="theme-color" content="#0891b2" />

    <!-- PWA / Mobile optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PresentIQ">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="PresentIQ — Attendance Management System" />
    <meta
      property="og:description"
      content="Advanced role-based attendance tracking and management for schools, colleges, and universities."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PresentIQ — Attendance Management System" />
    <meta
      name="twitter:description"
      content="A modern, role-based attendance tracking app for educational institutions."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
