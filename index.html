<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

    <!-- App Title -->
    <title>MyAttendanceHub</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Advanced AI-powered attendance tracker for students to manage subject-wise attendance and percentage."
    />
    <meta name="author" content="Gaurav Deori" />
    <meta name="theme-color" content="#064e3b" />

    <!-- PWA / Mobile optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AttendanceHub">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="MyAttendanceHub" />
    <meta
      property="og:description"
      content="Track your class attendance subject-wise with AI-powered routine import."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyAttendanceHub" />
    <meta
      name="twitter:description"
      content="A modern AI attendance tracking app for students."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
